<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeafLink | Job Application</title>
    <!-- Bootstrap 5 — responsive layouts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="job_form.css">
</head>
<body>
    <div class="container" id="jobFormContainer">
        <h1>Job Application Form</h1>
        <form class="applicationForm" id="applicationForm" novalidate>

            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName"
                   placeholder="Enter your full name" required>
            <span class="field-error" id="err-fullName"></span>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email"
                   placeholder="Enter your email" required>
            <span class="field-error" id="err-email"></span>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone"
                   placeholder="+91-XXXXXXXXXX" required>
            <span class="field-error" id="err-phone"></span>

            <label for="resume">Resume (PDF only):</label>
            <input type="file" id="resume" name="resume" accept=".pdf">
            <span class="field-error" id="err-resume"></span>

            <label for="coverLetter">Cover Letter:</label>
            <textarea id="coverLetter" name="coverLetter" rows="5"
                      placeholder="Tell us why you want to join LeafLink..." required></textarea>
            <span class="field-error" id="err-coverLetter"></span>

            <p class="form-status" id="formStatus"></p>
            <button type="submit" id="submitBtn">Submit Application</button>
        </form>
    </div>

    <!-- FormValidator OOJS class + API wiring -->
    <script src="job_form.js"></script>
    <!-- Bootstrap 5 JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
